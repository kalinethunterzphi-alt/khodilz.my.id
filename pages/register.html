<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | Khodilz</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.75rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 2rem;
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }

        .google-btn i {
            font-size: 1.2rem;
            color: #db4437;
        }

        .google-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin: 1rem 0;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .separator::before {
            margin-right: 0.5rem;
        }

        .separator::after {
            margin-left: 0.5rem;
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-grid">
        <div class="auth-col form-col">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-user-plus"></i>
                    <h2>Buat Akun Baru</h2>
                    <p>Bergabung dengan Khodilz</p>
                </div>

                <!-- Di dalam auth-card, sebelum form register, tambahkan: -->
                <a href="https://accounts.google.com/o/oauth2/v2/auth?client_id=498158056430-dgncbmfkco3j9v0np844iu07o6fr8qqq.apps.googleusercontent.com&redirect_uri=https://khodilz.my.id/api/google-auth&response_type=code&scope=email%20profile"
                    class="google-btn">
                    <i class="fab fa-google"></i> Daftar dengan Google
                </a>
                <div class="separator">atau daftar dengan email</div>
                <i class="fab fa-google"></i> Daftar dengan Google
                </a>

                <div class="separator">atau daftar dengan email</div>

                <form id="registerForm">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="regEmail" placeholder="email@domain.com" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-key"></i> Password</label>
                        <input type="password" id="regPassword" placeholder="Min. 8 karakter, Huruf Besar & Kecil"
                            required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Konfirmasi Password</label>
                        <input type="password" id="regConfirmPassword" placeholder="Ulangi password" required>
                    </div>
                    <div id="regError" class="error-message hidden"></div>
                    <button type="submit" class="auth-btn"><i class="fas fa-user-check"></i> Daftar</button>
                </form>
                <div class="auth-footer">
                    Sudah punya akun? <a href="/pages/login.html">Login di sini</a>
                </div>
            </div>
        </div>
        <div class="auth-col collage-col">
            <div class="collage-container">
                <img src="/images/website.png" alt="Web" class="collage-img c1">
                <img src="/images/nokos.png" alt="Nokos" class="collage-img c2">
                <img src="/images/osint.png" alt="Osint" class="collage-img c3">
                <img src="/images/panel.png" alt="Panel" class="collage-img c4">
            </div>
        </div>
    </div>
    <script src="/scripts/utils.js"></script>
    <script src="/scripts/auth.js"></script>
</body>

</html>
